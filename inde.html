<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>lookism.com</title>
<style>
  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-100: #f5f5f7;
    --gray-200: #e8e8ed;
    --gray-400: #98989d;
    --gray-600: #6e6e73;
    --gray-800: #1d1d1f;
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.12);
    --glass-blur: blur(24px) saturate(180%);
    --glass-bg-light: rgba(255,255,255,0.72);
    --glass-blur-light: blur(20px) saturate(180%);
    --radius: 18px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUNDS ── */
  .bg-noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(255,255,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 80% 80%, rgba(255,255,255,0.03) 0%, transparent 70%),
      #000;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 56px;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; padding: 0 20px;
    gap: 12px;
  }

  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.18); }
  .nav-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .nav-title {
    font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
    flex: 1; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .nav-spacer { width: 36px; flex-shrink: 0; }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    overflow-y: auto; padding-top: 56px;
    transition: opacity 0.35s cubic-bezier(.4,0,.2,1), transform 0.35s cubic-bezier(.4,0,.2,1);
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateX(32px); }
  .screen.slide-left { transform: translateX(-32px); opacity: 0; pointer-events: none; }

  /* ── HERO ── */
  #home {
    display: flex; flex-direction: column;
  }

  .hero {
    min-height: calc(100vh - 56px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
